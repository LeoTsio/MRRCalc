<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BusinessCalc</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="brand">
      <div class="brand__text">
        <h1>BusinessCalc</h1>
        <p>Calculate your Monthly Recurring Revenue as simple as possible.</p>
      </div>
    </header>

    <section class="card" aria-label="MRR calculator">
      <h2>Monthly Recurring Revenue</h2>
      <p class="card__desc">Enter your plan metrics and see instant results.</p>

      <div class="grid">
        <label class="field">
          <span class="field__label">Total users</span>
          <input type="number" id="totalUsers" min="0" placeholder="e.g. 1 250" />
        </label>

        <label class="field">
          <span class="field__label">Subscription fee</span>
          <div class="field__group">
            <span class="field__unit">$</span>
            <input type="number" id="subscriptionFee" min="0" step="0.01" placeholder="e.g. 19.99" />
          </div>
        </label>

        <label class="field">
          <span class="field__label">Conversion rate</span>
          <div class="field__group">
            <input type="number" id="conversionRate" min="0" max="100" step="0.1" placeholder="e.g. 6.5" />
            <span class="field__unit">%</span>
          </div>
        </label>
      </div>

      <div class="result" aria-live="polite">
        <div class="result__label">Estimated MRR</div>
        <div id="MRR" class="result__value">—</div>
        <div class="result__hint">MRR = Total users × (Conversion % ÷ 100) × Subscription fee</div>
      </div>

      <footer class="footnote">
        <small>Tip: keep an eye on conversion rate and average ticket size.</small>
      </footer>
    </section>
  </main>

  <script src="calculator.js"></script>
</body>
</html>
